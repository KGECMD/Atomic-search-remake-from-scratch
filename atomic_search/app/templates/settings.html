{% extends "base.html" %}

{% block title %}Settings - {{ config.app_name }}{% endblock %}

{% block content %}
<div class="settings-container">
    <h1>Settings</h1>
    
    <form method="POST" class="settings-form">
        <section class="settings-section">
            <h2>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                </svg>
                Appearance
            </h2>
            
            <div class="setting-item">
                <label for="theme">Theme</label>
                <select name="theme" id="theme">
                    <option value="auto" {% if theme == 'auto' %}selected{% endif %}>Auto (System)</option>
                    <option value="light" {% if theme == 'light' %}selected{% endif %}>Light</option>
                    <option value="dark" {% if theme == 'dark' %}selected{% endif %}>Dark</option>
                </select>
            </div>
            
            <div class="setting-item">
                <label for="accent_color">Accent Color</label>
                <input type="color" name="accent_color" id="accent_color" value="{{ accent_color }}">
            </div>
            
            <div class="setting-item">
                <label>
                    <input type="checkbox" name="compact_mode" {% if compact_mode %}checked{% endif %}>
                    Compact Mode
                </label>
            </div>
        </section>
        
        <section class="settings-section">
            <h2>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                </svg>
                Search Preferences
            </h2>
            
            <div class="setting-item">
                <label for="language">Language</label>
                <select name="language" id="language">
                    <option value="en">English</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="it">Italiano</option>
                    <option value="pt">Português</option>
                    <option value="ru">Русский</option>
                    <option value="zh">中文</option>
                    <option value="ja">日本語</option>
                </select>
            </div>
            
            <div class="setting-item">
                <label for="region">Region</label>
                <select name="region" id="region">
                    <option value="global">Global</option>
                    <option value="us">United States</option>
                    <option value="uk">United Kingdom</option>
                    <option value="de">Germany</option>
                    <option value="fr">France</option>
                    <option value="jp">Japan</option>
                    <option value="cn">China</option>
                    <option value="in">India</option>
                </select>
            </div>
            
            <div class="setting-item">
                <label for="safe_search">Safe Search</label>
                <select name="safe_search" id="safe_search">
                    <option value="off">Off</option>
                    <option value="moderate" selected>Moderate</option>
                    <option value="strict">Strict</option>
                </select>
            </div>
        </section>
        
        <section class="settings-section">
            <h2>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                Privacy
            </h2>
            
            <div class="setting-item">
                <label>
                    <input type="checkbox" name="block_trackers" checked>
                    Block Trackers
                </label>
            </div>
            
            <div class="setting-item">
                <label>
                    <input type="checkbox" name="block_ads" checked>
                    Block Ads
                </label>
            </div>
            
            <div class="setting-item">
                <label>
                    <input type="checkbox" name="anonymous_mode">
                    Anonymous Mode
                </label>
            </div>
        </section>
        
        <div class="settings-actions">
            <button type="submit" class="btn btn-primary">Save Settings</button>
            <a href="{{ url_for('main.index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
