<!DOCTYPE html>
<html data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ config.APP_NAME }} - Privacy-first search. No tracking, no ads, no cookies.">
    <title>{% block title %}{{ config.APP_NAME }} - Privacy-First Search{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}">
    
    <style>
        :root {
            --bg: #0f0f0f;
            --bg2: #1a1a1a;
            --bg3: #242424;
            --text: #e8e8e8;
            --text2: #9aa0a6;
            --text3: #70757a;
            --border: #3c4043;
            --accent: #667eea;
            --accent2: #8b5cf6;
            --link: #8ab4f8;
            --green: #34a853;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --bg2: #f8f9fa;
            --bg3: #f1f3f4;
            --text: #202124;
            --text2: #5f6368;
            --text3: #80868b;
            --border: #dadce0;
            --accent: #4285f4;
            --accent2: #6366f1;
            --link: #1a73e8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        a { color: var(--link); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Header */
        .hdr {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            gap: 16px;
            border-bottom: 1px solid var(--border);
        }

        .hdr-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 22px;
            font-weight: 500;
            color: var(--text);
        }

        .hdr-logo:hover { text-decoration: none; }

        .hdr-logo span { font-size: 28px; }

        .hdr-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hdr-link {
            padding: 8px 12px;
            color: var(--text);
            font-size: 14px;
        }

        .hdr-link:hover { text-decoration: none; }

        /* Nav */
        .nav {
            display: flex;
            padding: 8px 16px 0;
            gap: 24px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .nav a {
            padding: 12px 4px;
            color: var(--text2);
            border-bottom: 3px solid transparent;
        }

        .nav a:hover { text-decoration: none; color: var(--text); }
        .nav a.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* Search */
        .search-wrap {
            max-width: 652px;
            margin: 0 auto;
            padding: 40px 16px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 8px 16px;
            gap: 12px;
            transition: box-shadow 0.2s;
        }

        .search-box:focus-within {
            background: var(--bg);
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
        }

        .search-box svg { color: var(--text3); flex-shrink: 0; }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 16px;
            color: var(--text);
        }

        .search-input::placeholder { color: var(--text3); }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg2);
            color: var(--text);
            transition: all 0.15s;
        }

        .btn:hover { background: var(--bg3); }
        .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            padding: 4px;
            background: var(--bg2);
            border-radius: 20px;
            font-size: 14px;
        }

        .tabs a {
            padding: 6px 12px;
            border-radius: 16px;
            color: var(--text2);
        }

        .tabs a:hover { color: var(--text); }
        .tabs a.active { background: var(--bg3); color: var(--text); }

        /* Card */
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
        }

        /* Footer */
        .ftr {
            margin-top: auto;
            padding: 16px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--text3);
        }

        .ftr a { color: var(--text3); }
        .ftr a:hover { color: var(--text2); }

        .ftr-top {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .ftr-bot {
            text-align: center;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        /* Stats bar */
        .stats-bar {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            font-size: 13px;
            color: var(--text2);
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .stats-bar span { display: flex; align-items: center; gap: 6px; }
        .stats-bar .dot { color: var(--green); }

        /* Custom CSS injection */
        {% if custom_css %}{{ custom_css | safe }}{% endif %}
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="hdr">
        <a href="/" class="hdr-logo">
            <span>🔬</span>
            {{ config.APP_NAME }}
        </a>
        <div class="hdr-right">
            <a href="/settings" class="hdr-link">Settings</a>
            <a href="/about" class="hdr-link">About</a>
        </div>
    </header>

    {% block content %}{% endblock %}

    <footer class="ftr">
        <div class="ftr-top">
            <a href="/about">About</a>
            <a href="/privacy">Privacy</a>
            <a href="/terms">Terms</a>
            <a href="https://github.com/atomic-search/atomic-search" target="_blank">GitHub</a>
        </div>
        <div class="ftr-bot">
            <p>{{ config.APP_NAME }} v{{ config.APP_VERSION }} - No tracking. No ads. No cookies.</p>
            <p style="margin-top: 8px; opacity: 0.7;">
                Designed & Made by <strong>Kayan Erkama</strong> for the <strong>UCXP Project</strong>
            </p>
        </div>
    </footer>

    <script>
        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const theme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', theme);
            document.cookie = 'theme=' + theme + ';path=/;max-age=31536000';
        }

        // Load theme from cookie
        const theme = document.cookie.match(/theme=(\w+)/);
        if (theme) document.documentElement.setAttribute('data-theme', theme[1]);
    </script>
</body>
</html>
