[railway]
name = "atomic-search"

[build]
dockerfile = "Dockerfile"

[deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
startCommand = "gunicorn 'atomic_search.app:create_app()' --bind 0.0.0.0:${PORT} --workers 2 --threads 4"

[environment]
PORT = "8080"
FLASK_ENV = "production"
