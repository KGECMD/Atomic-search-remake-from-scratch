[railway]
name = "atomic-search"
description = "Privacy-first search engine with AI integration"

[build]
builder = "DOCKERFILE"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
startCommand = "gunicorn 'atomic_search.main:app' --bind 0.0.0.0:${PORT:-8080} --workers 2 --threads 4 --timeout 120"

[environment]
PORT = "8080"
